<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      :root {
        --primary: #2563eb;
        --bg: #f8fafc;
        --text: #1e293b;
        --card-bg: #ffffff;
        --border: #e2e8f0;
      }
      body {
        width: 330px;
        margin: 0;
        padding: 16px;
        font-family: "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        border-radius: 16px;
        overflow: hidden;
      }

      .header-wrap {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }
      h3 {
        font-size: 18px;
        margin: 0;
        color: var(--primary);
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .popout-btn {
        background: none;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        cursor: pointer;
        padding: 4px 8px;
        font-size: 13px;
        color: #475569;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .popout-btn:hover {
        background: #e2e8f0;
        color: var(--primary);
      }

      /* NEW: Toggle Switch CSS */
      .toggle-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #fff;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        margin-bottom: 16px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
      }
      .toggle-label {
        font-size: 13px;
        font-weight: 600;
        color: #475569;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .switch {
        position: relative;
        display: inline-block;
        width: 36px;
        height: 20px;
      }
      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #cbd5e1;
        transition: 0.3s;
        border-radius: 20px;
      }
      .slider:before {
        position: absolute;
        content: "";
        height: 14px;
        width: 14px;
        left: 3px;
        bottom: 3px;
        background-color: white;
        transition: 0.3s;
        border-radius: 50%;
      }
      input:checked + .slider {
        background-color: var(--primary);
      }
      input:checked + .slider:before {
        transform: translateX(16px);
      }

      #notesList {
        max-height: 240px;
        overflow-y: auto;
        margin-bottom: 16px;
        padding-right: 4px;
      }
      #notesList::-webkit-scrollbar {
        width: 5px;
      }
      #notesList::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }
      .note-card {
        position: relative;
        background: var(--card-bg);
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 12px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        border-left: 4px solid var(--primary);
      }
      .note-title {
        font-size: 14px;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 6px;
        padding-right: 40px;
        word-wrap: break-word;
      }
      .context {
        font-size: 11px;
        color: #92400e;
        background: #fffbeb;
        padding: 8px;
        margin-bottom: 8px;
        border-radius: 6px;
        border-left: 3px solid #f59e0b;
        line-height: 1.4;
        font-style: italic;
        display: block;
        word-wrap: break-word;
      }
      .content {
        font-size: 13px;
        line-height: 1.5;
        font-weight: 400;
        color: #334155;
        word-wrap: break-word;
      }
      .btn-edit {
        position: absolute;
        top: 8px;
        right: 32px;
        font-size: 14px;
        color: #94a3b8;
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
      }
      .btn-edit:hover {
        color: var(--primary);
      }
      .btn-delete {
        position: absolute;
        top: 6px;
        right: 8px;
        font-size: 18px;
        font-weight: 300;
        color: #94a3b8;
        border: none;
        background: transparent;
        cursor: pointer;
        line-height: 1;
        padding: 0;
        transition: color 0.2s;
      }
      .btn-delete:hover {
        color: #ef4444;
      }

      input[type="text"],
      textarea {
        width: 100%;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        padding: 10px;
        box-sizing: border-box;
        font-family: inherit;
        margin-bottom: 8px;
        transition: border-color 0.2s;
      }
      input[type="text"] {
        font-size: 14px;
        font-weight: 600;
      }
      textarea {
        resize: none;
        min-height: 70px;
        font-size: 13px;
      }
      input[type="text"]:focus,
      textarea:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      }
      button#saveBtn {
        width: 100%;
        background: var(--primary);
        color: white;
        border: none;
        padding: 12px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        font-size: 14px;
        transition: background 0.2s;
      }
      button#saveBtn:hover {
        background: #1d4ed8;
      }
      .empty-state {
        text-align: center;
        font-size: 13px;
        color: #94a3b8;
        margin: 20px 0;
      }
    </style>
  </head>
  <body>
    <div class="header-wrap">
      <h3>
      <img src="./icons/icon-24.png" alt="notes icon" class="icon-img" />
      ContextNote
    </h3>
      <button id="popOutBtn" class="popout-btn" title="Open sticky window">
        📌 Pop Out
      </button>
    </div>

    <!-- NEW: Toggle Switch -->
    <div class="toggle-container">
      <div class="toggle-label"><span>🖍️</span> Show Webpage Highlights</div>
      <label class="switch">
        <input type="checkbox" id="highlightToggle" />
        <span class="slider"></span>
      </label>
    </div>

    <div id="notesList"><div class="empty-state">Loading notes...</div></div>
    <input type="text" id="noteTitle" placeholder="Note Heading..." />
    <textarea
      id="noteInput"
      placeholder="Description / Note details..."
    ></textarea>
    <button id="saveBtn">Save Note</button>

    <div
      style="
        text-align: center;
        margin-top: 15px;
        border-top: 1px solid #e2e8f0;
        padding-top: 10px;
      "
    >
      <a
        href="#"
        id="openDashboard"
        style="
          font-size: 13px;
          color: var(--primary);
          text-decoration: none;
          font-weight: 600;
        "
        >Open Full Dashboard ↗</a
      >
    </div>
    <script src="popup.js"></script>
  </body>
</html>
